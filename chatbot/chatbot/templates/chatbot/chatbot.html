<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatbot</title>
  <style>
    body{font-family:system-ui;margin:0;background:#0a1929;color:#fff}
    .wrap{max-width:900px;margin:0 auto;padding:24px}
    #chat{height:70vh;overflow:auto;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:16px;background:rgba(255,255,255,.04)}
    .msg{margin:10px 0}
    .row{display:flex;gap:10px;margin-top:12px}
    input{flex:1;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.25);color:#fff}
    button{padding:14px 18px;border-radius:12px;border:none;background:#5b9bd5;color:#fff;font-weight:700;cursor:pointer}
    .meta{opacity:.75;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Local Chatbot (data.csv ML)</h2>
    <div id="chat"></div>
    <div class="row">
      <input id="msg" placeholder="Ask about fees, registration, schedule, policies..." />
      <button id="send">Send</button>
    </div>
  </div>
<script>
const chat = document.getElementById('chat');
const msg = document.getElementById('msg');
const send = document.getElementById('send');

function add(who, text, meta){
  const p=document.createElement('div');
  p.className='msg';
  const safe = (text||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  p.innerHTML = `<b>${who}:</b> ${safe}` + (meta ? `<div class="meta">${meta}</div>` : '');
  chat.appendChild(p);
  chat.scrollTop = chat.scrollHeight;
}

async function go(){
  const t = msg.value.trim();
  if(!t) return;
  add('You', t);
  msg.value='';
  const res = await fetch('/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({message:t})
  });
  const data = await res.json();
  add('Bot', data.response || '');
}

send.onclick = go;
msg.addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
add('Bot','Hello! 👋 Ask me about registration, fees, schedules, policies, contact.');
</script>
</body>
</html>
